version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: kubetask
      POSTGRES_USER: kubetask
      POSTGRES_PASSWORD: changeme
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kubetask"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./kubetask-app/backend
      dockerfile: Dockerfile
    environment:
      PORT: 3000
      NODE_ENV: development
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: kubetask
      POSTGRES_USER: kubetask
      POSTGRES_PASSWORD: changeme
      REDIS_HOST: redis
      REDIS_PORT: 6379
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./kubetask-app/backend/src:/app/src:ro

  frontend:
    build:
      context: ./kubetask-app/frontend
      dockerfile: Dockerfile
    environment:
      KUBETASK_API_BASE: http://localhost:3000/api
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
