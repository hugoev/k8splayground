apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kubetask-alerts
  labels:
    release: kube-prometheus-stack
spec:
  groups:
    - name: kubetask.rules
      rules:
        - alert: KubeTaskBackendHigh5xxRate
          expr: |
            sum(rate(kubetask_http_requests_total{status=~"5.."}[5m]))
              /
            sum(rate(kubetask_http_requests_total[5m])) > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "KubeTask backend 5xx ratio is above 5%"
        - alert: KubeTaskBackendHighLatencyP95
          expr: |
            histogram_quantile(0.95,
              sum(rate(kubetask_http_request_duration_seconds_bucket[5m])) by (le)
            ) > 1
          for: 10m
          labels:
            severity: warning
          annotations:
            summary: "KubeTask backend p95 latency is above 1 second"
