apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubetask-monitoring
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hugoev/k8splayground.git
    targetRevision: main
    path: kubetask-gitops/apps/monitoring/base
  destination:
    server: https://kubernetes.default.svc
    namespace: kubetask
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
