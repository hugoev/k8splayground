apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubetask-frontend
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/your-org/kubetask-gitops.git
    targetRevision: main
    path: apps/frontend/base
  destination:
    server: https://kubernetes.default.svc
    namespace: kubetask
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
